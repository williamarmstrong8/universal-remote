esphome:
  name: universal-remote
  on_boot:
    - priority: -100
      then:
        - lambda: 'lv_group_set_wrap(id(encoder_group), false);'
    - priority: 600
      then:
        - script.execute: backlight_on

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_encryption_key
  on_client_connected:
    - if:
        condition:
          not:
            lvgl.is_paused:
        then:
          - script.execute: backlight_on

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Universal-Remote"
    password: !secret ap_password

captive_portal:

# I2C bus for the BQ27220 battery gauge (readout wired in a later step)
i2c:
  sda: GPIO8
  scl: GPIO18
  scan: true

globals:
  - id: selected_tv_entity
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: selected_media_entity
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: tv_axis
    type: int
    restore_value: false
    initial_value: '0'   # 0 = horizontal (↔), 1 = vertical (↕)
  - id: tv_active
    type: bool
    restore_value: false
    initial_value: 'false'

time:
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      then:
        - lvgl.label.update:
            id: clock_label
            text: !lambda |-
              auto t = id(ha_time).now();
              if (!t.is_valid()) return std::string("--:--");
              int h = t.hour % 12; if (h == 0) h = 12;
              char buf[12];
              snprintf(buf, sizeof(buf), "%d:%02d %s", h, t.minute, t.hour < 12 ? "AM" : "PM");
              return std::string(buf);
    on_time:
      - seconds: 0
        then:
          - lvgl.label.update:
              id: clock_label
              text: !lambda |-
                auto t = id(ha_time).now();
                if (!t.is_valid()) return std::string("--:--");
                int h = t.hour % 12; if (h == 0) h = 12;
                char buf[12];
                snprintf(buf, sizeof(buf), "%d:%02d %s", h, t.minute, t.hour < 12 ? "AM" : "PM");
                return std::string(buf);

spi:
  clk_pin: GPIO11
  mosi_pin: GPIO9
  miso_pin: GPIO10

cc1101:
  cs_pin: GPIO12
  gdo0_pin:
    number: GPIO3
    allow_other_uses: true

remote_receiver:
  pin:
    number: GPIO3
    allow_other_uses: true
  dump: all
  tolerance: 25%

remote_transmitter:
  pin:
    number: GPIO3
    allow_other_uses: true
  carrier_duty_percent: 100%
  non_blocking: true

output:
  - platform: ledc
    pin: GPIO21
    id: backlight_output

light:
  - platform: monochromatic
    output: backlight_output
    name: "Display Backlight"
    id: display_backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 0s
    initial_state:
      brightness: 100%

font:
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf"
    id: mdi_36
    size: 36
    bpp: 4
    glyphs:
      - "\U000F0335"
      - "\U000F0336"

display:
  - platform: mipi_spi
    id: disp
    model: ST7789V
    dimensions:
      width: 170
      height: 320
      offset_width: 35
      offset_height: 0
    cs_pin: GPIO41
    dc_pin: GPIO16
    invert_colors: true
    update_interval: never
    auto_clear_enabled: false

script:
  - id: backlight_on
    then:
      - light.turn_on:
          id: display_backlight
          brightness: 100%
          transition_length: 0s

  - id: wake_screen
    then:
      - if:
          condition:
            lvgl.is_paused:
          then:
            - script.execute: backlight_on
            - lvgl.resume:
            - lvgl.widget.redraw:

  # Fills the hold-progress bar over ~500ms. Stopped on early release.
  - id: tv_hold_progress
    then:
      - lvgl.widget.show: tv_hold_bar
      - lvgl.bar.update: { id: tv_hold_bar, value: 0 }
      - delay: 83ms
      - lvgl.bar.update: { id: tv_hold_bar, value: 17 }
      - delay: 83ms
      - lvgl.bar.update: { id: tv_hold_bar, value: 33 }
      - delay: 83ms
      - lvgl.bar.update: { id: tv_hold_bar, value: 50 }
      - delay: 83ms
      - lvgl.bar.update: { id: tv_hold_bar, value: 67 }
      - delay: 83ms
      - lvgl.bar.update: { id: tv_hold_bar, value: 83 }
      - delay: 83ms
      - lvgl.bar.update: { id: tv_hold_bar, value: 100 }

  # Syncs the axis glyph to the current tv_axis value.
  - id: tv_update_axis_label
    then:
      - if:
          condition:
            lambda: 'return id(tv_axis) == 0;'
          then:
            - lvgl.label.update:
                id: tv_axis_label
                text: ""   # fa-arrows-h  ↔
          else:
            - lvgl.label.update:
                id: tv_axis_label
                text: ""   # fa-arrows-v  ↕

  # Brief brightness pulse on the axis indicator to confirm an axis switch.
  - id: tv_pulse_axis
    then:
      - lvgl.label.update:
          id: tv_axis_label
          text_color: 0xFFFFFF
      - delay: 250ms
      - lvgl.label.update:
          id: tv_axis_label
          text_color: 0x666666

sensor:
  - platform: rotary_encoder
    id: encoder
    pin_a: GPIO4
    pin_b: GPIO5
    resolution: 1
    on_clockwise:
      - script.execute: wake_screen
      - if:
          condition:
            lambda: 'return id(tv_active);'
          then:
            - if:
                condition:
                  lambda: 'return id(tv_axis) == 0;'
                then:
                  - homeassistant.service:
                      service: remote.send_command
                      data: { command: KEY_RIGHT }
                      data_template: { entity_id: "{{ ent }}" }
                      variables: { ent: 'return id(selected_tv_entity);' }
                else:
                  - homeassistant.service:
                      service: remote.send_command
                      data: { command: KEY_DOWN }
                      data_template: { entity_id: "{{ ent }}" }
                      variables: { ent: 'return id(selected_tv_entity);' }
    on_anticlockwise:
      - script.execute: wake_screen
      - if:
          condition:
            lambda: 'return id(tv_active);'
          then:
            - if:
                condition:
                  lambda: 'return id(tv_axis) == 0;'
                then:
                  - homeassistant.service:
                      service: remote.send_command
                      data: { command: KEY_LEFT }
                      data_template: { entity_id: "{{ ent }}" }
                      variables: { ent: 'return id(selected_tv_entity);' }
                else:
                  - homeassistant.service:
                      service: remote.send_command
                      data: { command: KEY_UP }
                      data_template: { entity_id: "{{ ent }}" }
                      variables: { ent: 'return id(selected_tv_entity);' }
  - platform: wifi_signal
    id: wifi_db
    update_interval: 15s
    internal: true
    on_value:
      then:
        - if:
            condition: { lambda: 'return x >= -88;' }
            then: [lvgl.widget.update: { id: wifi_bar_1, bg_color: 0xFFFFFF }]
            else: [lvgl.widget.update: { id: wifi_bar_1, bg_color: 0x444444 }]
        - if:
            condition: { lambda: 'return x >= -75;' }
            then: [lvgl.widget.update: { id: wifi_bar_2, bg_color: 0xFFFFFF }]
            else: [lvgl.widget.update: { id: wifi_bar_2, bg_color: 0x444444 }]
        - if:
            condition: { lambda: 'return x >= -65;' }
            then: [lvgl.widget.update: { id: wifi_bar_3, bg_color: 0xFFFFFF }]
            else: [lvgl.widget.update: { id: wifi_bar_3, bg_color: 0x444444 }]
        - if:
            condition: { lambda: 'return x >= -55;' }
            then: [lvgl.widget.update: { id: wifi_bar_4, bg_color: 0xFFFFFF }]
            else: [lvgl.widget.update: { id: wifi_bar_4, bg_color: 0x444444 }]

binary_sensor:
  - platform: gpio
    id: encoder_btn
    pin:
      number: GPIO0
      inverted: true
      mode:
        input: true
        pullup: true
    on_press:
      - script.execute: wake_screen
      - if:
          condition:
            lambda: 'return id(tv_active);'
          then:
            - script.execute: tv_hold_progress
    on_release:
      # Cancel hold animation on any release (no-op if already stopped/hidden).
      - script.stop: tv_hold_progress
      - lvgl.widget.hide: tv_hold_bar
    on_click:
      min_length: 30ms
      max_length: 400ms
      then:
        - if:
            condition:
              lambda: 'return id(tv_active);'
            then:
              - homeassistant.service:
                  service: remote.send_command
                  data: { command: KEY_ENTER }
                  data_template: { entity_id: "{{ ent }}" }
                  variables: { ent: 'return id(selected_tv_entity);' }
    on_double_click:
      min_length: 30ms
      max_length: 350ms
      then:
        - if:
            condition:
              lambda: 'return id(tv_active);'
            then:
              - lambda: 'id(tv_axis) = (id(tv_axis) == 0) ? 1 : 0;'
              - script.execute: tv_update_axis_label
              - script.execute: tv_pulse_axis
    on_multi_click:
      - timing:
          - ON for at least 500ms
        then:
          - if:
              condition:
                lambda: 'return id(tv_active);'
              then:
                - script.stop: tv_hold_progress
                - lvgl.widget.hide: tv_hold_bar
                - lvgl.widget.hide: tv_panel
                - lvgl.widget.show: home_panel
                - lambda: 'id(tv_active) = false;'
  - platform: homeassistant
    id: right_lamp_state
    entity_id: switch.right_bed_lamp
    on_state:
      then:
        - lvgl.label.update:
            id: right_icon
            text_color: !lambda 'return x ? lv_color_hex(0xFFFFFF) : lv_color_hex(0x555555);'
  - platform: homeassistant
    id: left_lamp_state
    entity_id: switch.left_bed_lamp
    on_state:
      then:
        - lvgl.label.update:
            id: left_icon
            text_color: !lambda 'return x ? lv_color_hex(0xFFFFFF) : lv_color_hex(0x555555);'
  - platform: homeassistant
    id: desk_lamp_state
    entity_id: switch.desk_lamp_2
    on_state:
      then:
        - lvgl.label.update:
            id: desk_icon
            text_color: !lambda 'return x ? lv_color_hex(0xFFFFFF) : lv_color_hex(0x555555);'

text_sensor:
  # Now-playing metadata. Each room subscribes to its own entity and only writes
  # the shared labels when that room is currently selected, so the media panel
  # reflects the active room. To add a room, copy this trio, swap entity_id, and
  # change the selected-room check.
  # ----- Kitchen (real Sonos entity) -----
  - platform: homeassistant
    id: kitchen_media_title
    entity_id: media_player.flr_2_kitchen
    attribute: media_title
    on_value:
      - if:
          condition:
            lambda: 'return id(selected_media_entity) == "media_player.flr_2_kitchen";'
          then:
            - lvgl.label.update:
                id: media_title_lbl
                text: !lambda 'return x.empty() ? std::string("Nothing playing") : x;'
  - platform: homeassistant
    id: kitchen_media_artist
    entity_id: media_player.flr_2_kitchen
    attribute: media_artist
    on_value:
      - if:
          condition:
            lambda: 'return id(selected_media_entity) == "media_player.flr_2_kitchen";'
          then:
            - lvgl.label.update: { id: media_artist_lbl, text: !lambda 'return x;' }
  - platform: homeassistant
    id: kitchen_media_state
    entity_id: media_player.flr_2_kitchen
    on_value:
      - if:
          condition:
            lambda: 'return id(selected_media_entity) == "media_player.flr_2_kitchen";'
          then:
            - lvgl.label.update:
                id: media_pp_icon
                text: !lambda 'return x == "playing" ? std::string("") : std::string("");'

lvgl:
  default_group: encoder_group
  rotation: 180
  displays:
    - disp
  encoders:
    - sensor: encoder
      enter_button: encoder_btn
  on_idle:
    timeout: 30s
    then:
      - light.turn_off: display_backlight
      - lvgl.pause:
  theme:
    obj:
      border_width: 0
    button:
      bg_color: 0xFFFFFF
      bg_opa: TRANSP
      border_color: 0xFFFFFF
      border_opa: 35%
      border_width: 2
      radius: 6
      text_color: 0xFFFFFF
      pad_all: 2
      pressed:
        bg_opa: 25%
      focused:
        border_opa: 100%
  top_layer:
    widgets:
      - obj:
          align: TOP_MID
          x: 0
          y: 0
          width: 170
          height: 26
          bg_color: 0x000000
          bg_opa: COVER
          border_width: 0
          radius: 0
          pad_left: 8
          pad_right: 8
          scrollable: false
          clickable: false
          widgets:
            - label:
                id: clock_label
                align: LEFT_MID
                text: "--:--"
                text_font: montserrat_14
                text_color: 0xFFFFFF
            - obj: { id: wifi_bar_1, align: BOTTOM_RIGHT, x: -74, y: -7, width: 3, height: 4,  bg_color: 0x444444, bg_opa: COVER, border_width: 0, radius: 0 }
            - obj: { id: wifi_bar_2, align: BOTTOM_RIGHT, x: -69, y: -7, width: 3, height: 7,  bg_color: 0x444444, bg_opa: COVER, border_width: 0, radius: 0 }
            - obj: { id: wifi_bar_3, align: BOTTOM_RIGHT, x: -64, y: -7, width: 3, height: 10, bg_color: 0x444444, bg_opa: COVER, border_width: 0, radius: 0 }
            - obj: { id: wifi_bar_4, align: BOTTOM_RIGHT, x: -59, y: -7, width: 3, height: 13, bg_color: 0x444444, bg_opa: COVER, border_width: 0, radius: 0 }
            - label:
                id: batt_icon
                align: RIGHT_MID
                text: ""
                text_font: montserrat_16
                text_color: 0x888888
      # Hold-progress bar — sits flush at the bottom of the screen.
      # Shown/hidden by tv_hold_progress script and on_release.
      - bar:
          id: tv_hold_bar
          hidden: true
          align: BOTTOM_MID
          y: -4
          width: 130
          height: 3
          min_value: 0
          max_value: 100
          value: 0
          bg_color: 0x2a2a2a
          bg_opa: COVER
          border_width: 0
          radius: 2
          indicator:
            bg_color: 0xFFFFFF
            bg_opa: COVER
            radius: 2
  pages:
    - id: home_page
      bg_color: 0x000000
      bg_opa: COVER
      border_width: 0
      pad_all: 0
      scrollable: false
      widgets:
        # ---------- HOME PANEL (tile list) ----------
        - obj:
            id: home_panel
            x: 0
            y: 26
            width: 170
            height: 294
            bg_opa: TRANSP
            border_width: 0
            radius: 0
            pad_top: 6
            pad_bottom: 6
            pad_left: 10
            pad_right: 10
            scrollbar_mode: "OFF"
            layout:
              type: FLEX
              flex_flow: COLUMN
              flex_align_main: START
              flex_align_cross: CENTER
              pad_row: 8
            widgets:
              - button:
                  id: right_tile
                  width: 150
                  height: 72
                  on_click:
                    - homeassistant.service: { service: switch.toggle, data: { entity_id: switch.right_bed_lamp } }
                  widgets:
                    - label: { id: right_icon, align: TOP_MID, y: 8, text: "\U000F0335", text_font: mdi_36, text_color: 0x888888 }
                    - label: { align: BOTTOM_MID, y: -6, text: "Right Lamp", text_font: montserrat_14, text_color: 0xFFFFFF }
              - button:
                  id: left_tile
                  width: 150
                  height: 72
                  on_click:
                    - homeassistant.service: { service: switch.toggle, data: { entity_id: switch.left_bed_lamp } }
                  widgets:
                    - label: { id: left_icon, align: TOP_MID, y: 8, text: "\U000F0335", text_font: mdi_36, text_color: 0x888888 }
                    - label: { align: BOTTOM_MID, y: -6, text: "Left Lamp", text_font: montserrat_14, text_color: 0xFFFFFF }
              - button:
                  id: desk_tile
                  width: 150
                  height: 72
                  on_click:
                    - homeassistant.service: { service: switch.toggle, data: { entity_id: switch.desk_lamp_2 } }
                  widgets:
                    - label: { id: desk_icon, align: TOP_MID, y: 8, text: "\U000F0335", text_font: mdi_36, text_color: 0x888888 }
                    - label: { align: BOTTOM_MID, y: -6, text: "Desk Lamp", text_font: montserrat_14, text_color: 0xFFFFFF }
              - button:
                  id: allon_tile
                  width: 150
                  height: 72
                  on_click:
                    - homeassistant.service: { service: switch.turn_on, data: { entity_id: switch.right_bed_lamp } }
                    - homeassistant.service: { service: switch.turn_on, data: { entity_id: switch.left_bed_lamp } }
                    - homeassistant.service: { service: switch.turn_on, data: { entity_id: switch.desk_lamp_2 } }
                  widgets:
                    - label: { align: TOP_MID, y: 8, text: "\U000F0335", text_font: mdi_36, text_color: 0xFFFFFF }
                    - label: { align: BOTTOM_MID, y: -6, text: "All On", text_font: montserrat_14, text_color: 0xFFFFFF }
              - button:
                  id: alloff_tile
                  width: 150
                  height: 72
                  on_click:
                    - homeassistant.service: { service: switch.turn_off, data: { entity_id: switch.right_bed_lamp } }
                    - homeassistant.service: { service: switch.turn_off, data: { entity_id: switch.left_bed_lamp } }
                    - homeassistant.service: { service: switch.turn_off, data: { entity_id: switch.desk_lamp_2 } }
                  widgets:
                    - label: { align: TOP_MID, y: 8, text: "\U000F0336", text_font: mdi_36, text_color: 0xFFFFFF }
                    - label: { align: BOTTOM_MID, y: -6, text: "All Off", text_font: montserrat_14, text_color: 0xFFFFFF }
              - button:
                  id: tv_tile
                  width: 150
                  height: 72
                  on_click:
                    # Single TV entity. Set this to your TV's remote entity in HA.
                    - lambda: 'id(selected_tv_entity) = "remote.tv"; id(tv_axis) = 0; id(tv_active) = true;'
                    - lvgl.label.update: { id: tv_title, text: "TV" }
                    - script.execute: tv_update_axis_label
                    - lvgl.widget.hide: home_panel
                    - lvgl.widget.show: tv_panel
                  widgets:
                    - label: { align: TOP_MID, y: 8, text: "", text_font: montserrat_36, text_color: 0xFFFFFF }
                    - label: { align: BOTTOM_MID, y: -6, text: "TV", text_font: montserrat_14, text_color: 0xFFFFFF }
              - button:
                  id: media_tile
                  width: 150
                  height: 72
                  on_click:
                    - lvgl.widget.hide: home_panel
                    - lvgl.widget.show: rooms_panel
                  widgets:
                    - label: { align: TOP_MID, y: 8, text: "", text_font: montserrat_36, text_color: 0xFFFFFF }
                    - label: { align: BOTTOM_MID, y: -6, text: "Media", text_font: montserrat_14, text_color: 0xFFFFFF }
        # ---------- TV PANEL (shared D-pad) ----------
        - obj:
            id: tv_panel
            hidden: true
            x: 0
            y: 26
            width: 170
            height: 294
            bg_color: 0x000000
            bg_opa: COVER
            border_width: 0
            radius: 0
            pad_all: 6
            scrollable: false
            layout:
              type: GRID
              grid_columns: [FR(1), FR(1), FR(1)]
              grid_rows: [30, FR(1), FR(1), FR(1), FR(1)]
            widgets:
              # Header row: title (centred) + axis indicator (right-aligned).
              - obj:
                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 0
                  grid_cell_column_span: 3
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  widgets:
                    - label:
                        id: tv_title
                        align: CENTER
                        text: "TV"
                        text_font: montserrat_18
                        text_color: 0xFFFFFF
                    - label:
                        id: tv_axis_label
                        align: RIGHT_MID
                        x: -4
                        text: ""
                        text_font: montserrat_14
                        text_color: 0x666666
              - button:
                  id: tv_up_btn
                  grid_cell_row_pos: 1
                  grid_cell_column_pos: 1
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  on_click:
                    - homeassistant.service: { service: remote.send_command, data: { command: KEY_UP }, data_template: { entity_id: "{{ ent }}" }, variables: { ent: 'return id(selected_tv_entity);' } }
                  widgets:
                    - label: { align: CENTER, text: "", text_font: montserrat_24 }
              - button:
                  id: tv_left_btn
                  grid_cell_row_pos: 2
                  grid_cell_column_pos: 0
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  on_click:
                    - homeassistant.service: { service: remote.send_command, data: { command: KEY_LEFT }, data_template: { entity_id: "{{ ent }}" }, variables: { ent: 'return id(selected_tv_entity);' } }
                  widgets:
                    - label: { align: CENTER, text: "", text_font: montserrat_24 }
              - button:
                  id: tv_ok_btn
                  grid_cell_row_pos: 2
                  grid_cell_column_pos: 1
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  on_click:
                    - homeassistant.service: { service: remote.send_command, data: { command: KEY_ENTER }, data_template: { entity_id: "{{ ent }}" }, variables: { ent: 'return id(selected_tv_entity);' } }
                  widgets:
                    - label: { align: CENTER, text: "OK", text_font: montserrat_18 }
              - button:
                  id: tv_right_btn
                  grid_cell_row_pos: 2
                  grid_cell_column_pos: 2
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  on_click:
                    - homeassistant.service: { service: remote.send_command, data: { command: KEY_RIGHT }, data_template: { entity_id: "{{ ent }}" }, variables: { ent: 'return id(selected_tv_entity);' } }
                  widgets:
                    - label: { align: CENTER, text: "", text_font: montserrat_24 }
              - button:
                  id: tv_down_btn
                  grid_cell_row_pos: 3
                  grid_cell_column_pos: 1
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  on_click:
                    - homeassistant.service: { service: remote.send_command, data: { command: KEY_DOWN }, data_template: { entity_id: "{{ ent }}" }, variables: { ent: 'return id(selected_tv_entity);' } }
                  widgets:
                    - label: { align: CENTER, text: "", text_font: montserrat_24 }
              - button:
                  id: tv_back_btn
                  grid_cell_row_pos: 4
                  grid_cell_column_pos: 0
                  grid_cell_column_span: 3
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  on_click:
                    - script.stop: tv_hold_progress
                    - lvgl.widget.hide: tv_hold_bar
                    - lvgl.widget.hide: tv_panel
                    - lvgl.widget.show: home_panel
                    - lambda: 'id(tv_active) = false;'
                  widgets:
                    - label: { align: CENTER, text: "  ", text_font: montserrat_18 }
        # ---------- ROOMS PANEL (media room select) ----------
        - obj:
            id: rooms_panel
            hidden: true
            x: 0
            y: 26
            width: 170
            height: 294
            bg_color: 0x000000
            bg_opa: COVER
            border_width: 0
            radius: 0
            pad_top: 6
            pad_bottom: 6
            pad_left: 10
            pad_right: 10
            scrollbar_mode: "OFF"
            layout:
              type: FLEX
              flex_flow: COLUMN
              flex_align_main: START
              flex_align_cross: CENTER
              pad_row: 8
            widgets:
              - label: { text: "Rooms", text_font: montserrat_14, text_color: 0x888888, pad_bottom: 2 }
              - button:
                  id: room_kitchen_btn
                  width: 150
                  height: 56
                  on_click:
                    # real Sonos entity supplied by user
                    - lambda: 'id(selected_media_entity) = "media_player.flr_2_kitchen";'
                    - lvgl.label.update: { id: media_room_title, text: "Kitchen" }
                    - lvgl.label.update: { id: media_title_lbl, text: "..." }
                    - lvgl.label.update: { id: media_artist_lbl, text: "" }
                    - lvgl.widget.hide: rooms_panel
                    - lvgl.widget.show: media_panel
                  widgets:
                    - label: { align: CENTER, text: "Kitchen", text_font: montserrat_16, text_color: 0xFFFFFF }
              - button:
                  id: room_living_btn
                  width: 150
                  height: 56
                  on_click:
                    # placeholder — set to the room's real Sonos media_player entity
                    - lambda: 'id(selected_media_entity) = "media_player.flr_1_living_room";'
                    - lvgl.label.update: { id: media_room_title, text: "Living Room" }
                    - lvgl.label.update: { id: media_title_lbl, text: "..." }
                    - lvgl.label.update: { id: media_artist_lbl, text: "" }
                    - lvgl.widget.hide: rooms_panel
                    - lvgl.widget.show: media_panel
                  widgets:
                    - label: { align: CENTER, text: "Living Room", text_font: montserrat_16, text_color: 0xFFFFFF }
              - button:
                  id: room_bedroom_btn
                  width: 150
                  height: 56
                  on_click:
                    # placeholder — set to the room's real Sonos media_player entity
                    - lambda: 'id(selected_media_entity) = "media_player.flr_2_bedroom";'
                    - lvgl.label.update: { id: media_room_title, text: "Bedroom" }
                    - lvgl.label.update: { id: media_title_lbl, text: "..." }
                    - lvgl.label.update: { id: media_artist_lbl, text: "" }
                    - lvgl.widget.hide: rooms_panel
                    - lvgl.widget.show: media_panel
                  widgets:
                    - label: { align: CENTER, text: "Bedroom", text_font: montserrat_16, text_color: 0xFFFFFF }
              - button:
                  id: room_office_btn
                  width: 150
                  height: 56
                  on_click:
                    # placeholder — set to the room's real Sonos media_player entity
                    - lambda: 'id(selected_media_entity) = "media_player.flr_2_office";'
                    - lvgl.label.update: { id: media_room_title, text: "Office" }
                    - lvgl.label.update: { id: media_title_lbl, text: "..." }
                    - lvgl.label.update: { id: media_artist_lbl, text: "" }
                    - lvgl.widget.hide: rooms_panel
                    - lvgl.widget.show: media_panel
                  widgets:
                    - label: { align: CENTER, text: "Office", text_font: montserrat_16, text_color: 0xFFFFFF }
              - button:
                  id: rooms_back_btn
                  width: 150
                  height: 40
                  on_click:
                    - lvgl.widget.hide: rooms_panel
                    - lvgl.widget.show: home_panel
                  widgets:
                    - label: { align: CENTER, text: "  Back", text_font: montserrat_16 }
        # ---------- MEDIA PANEL (transport for selected room) ----------
        - obj:
            id: media_panel
            hidden: true
            x: 0
            y: 26
            width: 170
            height: 294
            bg_color: 0x000000
            bg_opa: COVER
            border_width: 0
            radius: 0
            pad_top: 10
            pad_bottom: 10
            pad_left: 10
            pad_right: 10
            scrollable: false
            layout:
              type: FLEX
              flex_flow: COLUMN
              flex_align_main: START
              flex_align_cross: CENTER
              pad_row: 10
            widgets:
              - label: { id: media_room_title, text: "Room", text_font: montserrat_14, text_color: 0x888888 }
              - label: { id: media_title_lbl, text: "Nothing playing", text_font: montserrat_16, text_color: 0xFFFFFF, width: 150, long_mode: WRAP, text_align: CENTER }
              - label: { id: media_artist_lbl, text: "", text_font: montserrat_14, text_color: 0x888888, width: 150, long_mode: DOT, text_align: CENTER }
              - obj:
                  width: 150
                  height: 50
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  layout: { type: FLEX, flex_flow: ROW, flex_align_main: SPACE_EVENLY, flex_align_cross: CENTER }
                  widgets:
                    - button:
                        id: media_prev_btn
                        width: 42
                        height: 42
                        on_click:
                          - homeassistant.service:
                              service: media_player.media_previous_track
                              data_template: { entity_id: "{{ ent }}" }
                              variables: { ent: 'return id(selected_media_entity);' }
                        widgets:
                          - label: { align: CENTER, text: "", text_font: montserrat_18 }
                    - button:
                        id: media_pp_btn
                        width: 48
                        height: 48
                        on_click:
                          - homeassistant.service:
                              service: media_player.media_play_pause
                              data_template: { entity_id: "{{ ent }}" }
                              variables: { ent: 'return id(selected_media_entity);' }
                        widgets:
                          - label: { id: media_pp_icon, align: CENTER, text: "", text_font: montserrat_24 }
                    - button:
                        id: media_next_btn
                        width: 42
                        height: 42
                        on_click:
                          - homeassistant.service:
                              service: media_player.media_next_track
                              data_template: { entity_id: "{{ ent }}" }
                              variables: { ent: 'return id(selected_media_entity);' }
                        widgets:
                          - label: { align: CENTER, text: "", text_font: montserrat_18 }
              - obj:
                  width: 150
                  height: 42
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  layout: { type: FLEX, flex_flow: ROW, flex_align_main: SPACE_EVENLY, flex_align_cross: CENTER }
                  widgets:
                    - button:
                        id: media_voldown_btn
                        width: 66
                        height: 38
                        on_click:
                          - homeassistant.service:
                              service: media_player.volume_down
                              data_template: { entity_id: "{{ ent }}" }
                              variables: { ent: 'return id(selected_media_entity);' }
                        widgets:
                          - label: { align: CENTER, text: "", text_font: montserrat_18 }
                    - button:
                        id: media_volup_btn
                        width: 66
                        height: 38
                        on_click:
                          - homeassistant.service:
                              service: media_player.volume_up
                              data_template: { entity_id: "{{ ent }}" }
                              variables: { ent: 'return id(selected_media_entity);' }
                        widgets:
                          - label: { align: CENTER, text: "", text_font: montserrat_18 }
              # Spotify playback on the selected room. Sonos plays Spotify natively once
              # your account is linked in the Sonos app, so no Home Assistant API key is
              # needed for this path. Swap the playlist URI for your own.
              - button:
                  id: media_spotify_btn
                  width: 150
                  height: 40
                  on_click:
                    - homeassistant.service:
                        service: media_player.play_media
                        data:
                          media_content_type: playlist
                          media_content_id: "spotify:playlist:3YMs3coBRrkStUj6hziqQD"
                        data_template: { entity_id: "{{ ent }}" }
                        variables: { ent: 'return id(selected_media_entity);' }
                    # Alternative via Music Assistant (adds search/browse; the supported
                    # path if Sonos-native Spotify is unavailable):
                    # - homeassistant.service:
                    #     service: music_assistant.play_media
                    #     data: { media_id: "spotify://playlist/3YMs3coBRrkStUj6hziqQD" }
                    #     data_template: { entity_id: "{{ ent }}" }
                    #     variables: { ent: 'return id(selected_media_entity);' }
                  widgets:
                    - label: { align: CENTER, text: "Play Playlist", text_font: montserrat_16, text_color: 0xFFFFFF }
              - button:
                  id: media_back_btn
                  width: 150
                  height: 38
                  on_click:
                    - lvgl.widget.hide: media_panel
                    - lvgl.widget.show: rooms_panel
                  widgets:
                    - label: { align: CENTER, text: "  Rooms", text_font: montserrat_16 }
button:
  - platform: restart
    name: "Remote Restart"